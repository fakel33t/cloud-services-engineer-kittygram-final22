version: '3.8'

services:
  postgres:
    image: postgres:13
    container_name: postgres
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    image: ceosea/kittygram_backend:latest
    container_name: backend
    env_file: .env
    volumes:
      - static:/app/collected_static
      - media:/app/media
    depends_on:
      - postgres

  frontend:
    image: ceosea/kittygram_frontend:latest
    container_name: frontend
    command: npx -y http-server -p 8000 /app/build
    volumes:
      - static:/app/build

  gateway:
    image: ceosea/kittygram_gateway:latest
    container_name: gateway
    ports:
      - "9000:80"
    volumes:
      - static:/static
      - media:/media
    depends_on:
      - backend
      - frontend

volumes:
  pg_data:
  static:
  media:
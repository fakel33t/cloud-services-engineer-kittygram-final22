server {
    listen 80;
    client_max_body_size 20M;
    server_tokens off;

    location /api/ {
        proxy_set_header Host $http_host;
        proxy_pass http://backend:9000/api/;
    }
    location /admin/ {
        proxy_set_header Host $http_host;
        proxy_pass http://backend:9000/admin/;
    }
    location /media/ {
        alias /media/;
    }
    
    # Nginx будет искать статику админки и API прямо в корне
    location /static/admin/ {
        root /;
    }
    location /static/rest_framework/ {
        root /;
    }
    
    # А статику React и главную страницу будет отдавать так:
    location / {
        alias /static/;
        try_files $uri $uri/ /index.html;
    }
}